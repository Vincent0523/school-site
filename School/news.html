<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>News & Events | Ridgeview Senior High School</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body>
  <body>
  <section id="news-section">
    <h2>Latest News & Events</h2>
    <div id="newsList">Loading news...</div>
  </section>
  <section id="news-section">
  <h2>Latest News & Events</h2>
  <div id="newsList">Loading news...</div>
</section>


  <script>
    window.onload = function () {
  fetch('https://api.npoint.io/0da7f8cf8f5edb05a06d')
    .then(response => {
      if (!response.ok) {
        throw new Error('Network response was not ok');
      }
      return response.json();
    })
    .then(news => {
      const container = document.getElementById('newsList');
      container.innerHTML = '';

      if (!Array.isArray(news) || news.length === 0) {
        container.innerHTML = '<p>No news available at the moment.</p>';
        return;
      }

      news.forEach(item => {
        const newsDiv = document.createElement('div');
        newsDiv.className = 'news-item';

        // Format the date nicely
        const date = new Date(item.date);
        const formattedDate = date.toLocaleDateString(undefined, {
          year: 'numeric', month: 'long', day: 'numeric'
        });

        newsDiv.innerHTML = `
          <img src="${item.image}" alt="${item.title}" style="max-width: 100%; border-radius: 10px;">
          <h3>${item.title}</h3>
          <small>${formattedDate}</small>
          <p>${item.summary}</p>
          <hr/>
        `;

        container.appendChild(newsDiv);
      });
    })
    .catch(error => {
      console.error('Error fetching news:', error);
      document.getElementById('newsList').innerHTML = `<p>Failed to load news.</p>`;
    });
};
</script> <!-- or inline JS below -->
</body>

</body>
</html>
